<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="polyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#8a9ea7" stop-opacity="0.2" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#000000"/>
  
  <g id="rotating-polyhedron">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 250 250" 
      to="360 250 250" 
      dur="6s" 
      repeatCount="indefinite" />
      
    <g stroke="#d8e2dc" stroke-width="2" fill="none" filter="url(#glow)">
      <polygon points="250,100 150,220 250,340 350,220" stroke="#f0ebd8" stroke-width="1.5" />
      <polygon points="250,100 150,220 250,250" />
      <polygon points="250,340 150,220 250,250" />
      <polygon points="250,100 350,220 250,250" />
      <polygon points="250,340 350,220 250,250" />
      <line x1="250" y1="100" x2="250" y2="340" stroke="#b0c4de" stroke-width="1" />
      <line x1="150" y1="220" x2="350" y2="220" stroke="#b0c4de" stroke-width="1" />
      <line x1="210" y1="160" x2="290" y2="300" stroke="#94d2bd" stroke-width="1" />
      <line x1="290" y1="160" x2="210" y2="300" stroke="#94d2bd" stroke-width="1" />
    </g>
    
    <text x="250" y="255" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold">
      CAMINAR
    </text>
  </g>
</svg>